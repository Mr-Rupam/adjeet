name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adjeet-site/package-lock.json
      - run: npm ci
        working-directory: adjeet-site
      - run: npm run lint
        working-directory: adjeet-site
      - run: npm run build
        working-directory: adjeet-site
        env:
          SKIP_ENV_VALIDATION: true
      - run: npm test
        working-directory: adjeet-site
